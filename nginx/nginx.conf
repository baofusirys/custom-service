user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式（含 X-Forwarded-For 真实 IP 和 WebSocket upgrade 状态）
    log_format main escape=json
        '{"time":"$time_iso8601","ip":"$http_x_forwarded_for|$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"size":$body_bytes_sent,"latency":$request_time,'
        '"upstream":"$upstream_addr","ua":"$http_user_agent","ref":"$http_referer",'
        '"upgrade":"$http_upgrade"}';
    access_log /var/log/nginx/access.log main;

    # 性能 / 并发
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 10000;
    server_tokens off;
    client_max_body_size 25m; # 比后端 BACKEND_MAX_UPLOAD_MB 略大一点

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 限流区域（爷爷铁律：防 DDoS / 防同 IP 暴力）
    #   limit_req_zone：按 IP 限速
    #   limit_conn_zone：按 IP 限并发连接数（保护 WSS 不被恶意占用）
    limit_req_zone  $binary_remote_addr zone=api_rps:20m rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=ws_rps:10m  rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=login_rps:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/octet-stream image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
