user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式（含 X-Forwarded-For 真实 IP 和 WebSocket upgrade 状态）
    log_format main escape=json
        '{"time":"$time_iso8601","ip":"$http_x_forwarded_for|$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"size":$body_bytes_sent,"latency":$request_time,'
        '"upstream":"$upstream_addr","ua":"$http_user_agent","ref":"$http_referer",'
        '"upgrade":"$http_upgrade"}';
    access_log /var/log/nginx/access.log main;

    # 性能 / 并发
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 10000;
    server_tokens off;
    client_max_body_size 25m; # 比后端 BACKEND_MAX_UPLOAD_MB 略大一点

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ========================================================
    # Docker 内置 DNS（127.0.0.11）+ 短 TTL，让 proxy_pass 用变量时
    # 每次请求都动态解析 service hostname 到当前最新容器 IP。
    # 修复了「upstream 块启动时只解析一次 → 其他容器重启换 IP 后
    # 反代到错误容器」这个老问题。
    # ========================================================
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ========================================================
    # [049] 反向代理链 IP 透传（集成方在 caddy/traefik/nginx/CDN 后部署必配）
    # ========================================================
    # 不加这段的话，cs-nginx 看到的 $remote_addr 是上层代理容器 IP（如 caddy 容器 172.18.0.5）：
    #   - 下面 limit_req_zone $binary_remote_addr 按代理容器 IP 限流 → 所有访客共用一个限流桶 → 集体 429
    #   - proxy_set_header X-Real-IP $remote_addr 传给 backend 的也是代理容器 IP
    #     → backend 的 ClientIP() 拿到错的 IP → backend 限流再撞一次 → 双层 429 死循环
    # 加这段后：当 $remote_addr 来自下面列出的可信网段（docker 内网），
    # nginx realip 模块从上游 X-Real-IP header 提取真访客 IP 覆盖 $remote_addr，
    # 下面所有 limit_req_zone + proxy_set_header 都自动用真访客 IP。
    set_real_ip_from 172.16.0.0/12;     # docker 默认 bridge 网段（cs-net / 任意 docker 网络）
    set_real_ip_from 10.0.0.0/8;        # 其他常见私网 / k8s pod 网段
    set_real_ip_from 192.168.0.0/16;    # 家庭/办公局域网部署
    set_real_ip_from 127.0.0.0/8;       # localhost 反代场景
    real_ip_header X-Real-IP;           # 跟集成方惯例（caddy/traefik/nginx 默认设这个）
    real_ip_recursive on;               # X-Forwarded-For 多层链时递归剥到最左非信任 IP

    # 限流区域（爷爷铁律：防 DDoS / 防同 IP 暴力）
    #   limit_req_zone：按 IP 限速
    #   limit_conn_zone：按 IP 限并发连接数（保护 WSS 不被恶意占用）
    # 注：$binary_remote_addr 在 realip 改写后是真访客 IP，多层代理下也安全
    limit_req_zone  $binary_remote_addr zone=api_rps:20m rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=ws_rps:10m  rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=login_rps:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/octet-stream image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
