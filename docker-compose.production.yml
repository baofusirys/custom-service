name: custom-service

# ============================================================
# 生产部署专用 docker-compose（用 GHCR 预编译镜像，不在本机编译）
# ============================================================
# 用法（不 clone 仓库，2 个文件 5 分钟跑起来）：
#   curl -fsSL https://raw.githubusercontent.com/baofusirys/custom-service/main/docker-compose.production.yml -o docker-compose.yml
#   curl -fsSL https://raw.githubusercontent.com/baofusirys/custom-service/main/.env.example -o .env
#   vim .env  # 改 PUBLIC_DOMAIN / ACME_EMAIL / 6 个密码 / TURN_EXTERNAL_IP
#   docker compose pull && docker compose up -d
#
# 升级（pull 新镜像 + 重启，不编译）：
#   docker compose pull && docker compose up -d
#
# 跟开发版 docker-compose.yml 区别：
#   - 所有 build: 改为 image: ghcr.io/baofusirys/cs-*:latest
#   - 不需要源码，纯运维操作
# 想从源码自己 build？用 docker-compose.yml（开发版，docker compose up -d --build）
# ============================================================

x-image-tag: &tag latest

services:

  mysql:
    image: ghcr.io/baofusirys/cs-mysql:latest
    container_name: cs-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - cs_mysql_data:/var/lib/mysql
    networks: [cs-net]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: ghcr.io/baofusirys/cs-redis:latest
    container_name: cs-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - cs_redis_data:/data
    networks: [cs-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    image: ghcr.io/baofusirys/cs-backend:latest
    container_name: cs-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DATA_AES_KEY: ${DATA_AES_KEY}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ENABLE_HTTPS: ${ENABLE_HTTPS}
      BACKEND_HTTP_PORT: ${BACKEND_HTTP_PORT:-8080}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      BACKEND_MAX_UPLOAD_MB: ${BACKEND_MAX_UPLOAD_MB:-20}
      SECURITY_IP_HTTP_RPM: ${SECURITY_IP_HTTP_RPM:-60}
      SECURITY_IP_WS_HANDSHAKE_PM: ${SECURITY_IP_WS_HANDSHAKE_PM:-5}
      SECURITY_VISITOR_MSG_PM: ${SECURITY_VISITOR_MSG_PM:-10}
      SECURITY_IP_BLACKLIST_THRESHOLD: ${SECURITY_IP_BLACKLIST_THRESHOLD:-200}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      TURN_REALM: ${TURN_REALM}
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET}
      TURN_LISTEN_PORT: ${TURN_LISTEN_PORT:-3478}
      TURN_TLS_PORT: ${TURN_TLS_PORT:-5349}
    volumes:
      - ${HOST_DATA_DIR:-/srv/cs-data}/logs/backend:/app/logs
      - ${HOST_DATA_DIR:-/srv/cs-data}/uploads:/app/uploads
    networks: [cs-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  admin:
    image: ghcr.io/baofusirys/cs-admin:latest
    container_name: cs-admin
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks: [cs-net]

  widget:
    image: ghcr.io/baofusirys/cs-widget:latest
    container_name: cs-widget
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks: [cs-net]

  coturn:
    image: ghcr.io/baofusirys/cs-coturn:latest
    container_name: cs-coturn
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP}
      TURN_REALM: ${TURN_REALM}
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET}
      TURN_LISTEN_PORT: ${TURN_LISTEN_PORT:-3478}
      TURN_TLS_PORT: ${TURN_TLS_PORT:-5349}
      TURN_MIN_PORT: ${TURN_MIN_PORT:-50000}
      TURN_MAX_PORT: ${TURN_MAX_PORT:-50200}
    volumes:
      - cs_ssl_data:/etc/coturn/ssl-src:ro
      - ${HOST_DATA_DIR:-/srv/cs-data}/logs/coturn:/var/log/coturn

  nginx:
    image: ghcr.io/baofusirys/cs-nginx:latest
    container_name: cs-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      admin:
        condition: service_started
      widget:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ENABLE_HTTPS: ${ENABLE_HTTPS:-true}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ${HOST_DATA_DIR:-/srv/cs-data}/logs/nginx:/var/log/nginx
      - cs_ssl_data:/etc/nginx/ssl
      - cs_acme_data:/opt/acme.sh
    networks: [cs-net]

volumes:
  cs_mysql_data:
    name: cs_mysql_data
  cs_redis_data:
    name: cs_redis_data
  cs_ssl_data:
    name: cs_ssl_data
  cs_acme_data:
    name: cs_acme_data

networks:
  cs-net:
    name: cs-net
    driver: bridge
