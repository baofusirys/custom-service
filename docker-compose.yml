name: custom-service

# ============================================================
# 部署铁律遵循说明：
#   1. 所有服务一律 Dockerfile 构建（build:），不用 image + volume 挂静态文件。
#   2. 状态数据用 named volume（mysql / redis），不挂仓库目录。
#   3. 日志和上传文件 bind 到 ${HOST_DATA_DIR}（默认 /srv/cs-data）—— 仓库目录外，
#      防止「清空代码目录重新上传」造成数据丢失。
#   4. 一条命令完成全部重建：docker compose up -d --build
# ============================================================

services:

  mysql:
    build:
      context: ./mysql
    container_name: cs-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - cs_mysql_data:/var/lib/mysql
    networks: [cs-net]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    build:
      context: ./redis
    container_name: cs-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - cs_redis_data:/data
    networks: [cs-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: cs-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DATA_AES_KEY: ${DATA_AES_KEY}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ENABLE_HTTPS: ${ENABLE_HTTPS}
      BACKEND_HTTP_PORT: ${BACKEND_HTTP_PORT:-8080}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      BACKEND_MAX_UPLOAD_MB: ${BACKEND_MAX_UPLOAD_MB:-20}
      SECURITY_IP_HTTP_RPM: ${SECURITY_IP_HTTP_RPM:-60}
      SECURITY_IP_WS_HANDSHAKE_PM: ${SECURITY_IP_WS_HANDSHAKE_PM:-5}
      SECURITY_VISITOR_MSG_PM: ${SECURITY_VISITOR_MSG_PM:-10}
      SECURITY_IP_BLACKLIST_THRESHOLD: ${SECURITY_IP_BLACKLIST_THRESHOLD:-200}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      # TURN 短期凭证生成所需（与 coturn 容器共享同一个 secret）
      TURN_REALM: ${TURN_REALM}
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET}
    volumes:
      # 日志和上传都 bind 到仓库外的绝对路径，重启 / 重新上传代码绝不丢
      - ${HOST_DATA_DIR:-/srv/cs-data}/logs/backend:/app/logs
      - ${HOST_DATA_DIR:-/srv/cs-data}/uploads:/app/uploads
    networks: [cs-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  admin:
    build:
      context: ./admin
      args:
        VITE_API_BASE: /api
        VITE_WS_BASE: /ws
    container_name: cs-admin
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks: [cs-net]

  widget:
    build:
      context: ./widget
      args:
        VITE_DEFAULT_ENDPOINT: ${PUBLIC_DOMAIN}
    container_name: cs-widget
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks: [cs-net]

  # ============================================================
  # CoTURN：WebRTC TURN/STUN relay
  # 用 host 网络模式：UDP relay 端口范围大（49152-49200），走 bridge 性能差且 srflx 会拿到错 IP
  # 5349 复用 nginx 的 maihaocs.icu Let's Encrypt 证书（cs_ssl_data 命名卷只读挂载）
  # 引入原因详见 turn/README.md 与 CHANGELOG [035]
  # ============================================================
  coturn:
    build:
      context: ./turn
    container_name: cs-coturn
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP}
      TURN_REALM: ${TURN_REALM}
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET}
    volumes:
      # 复用 nginx 的 Let's Encrypt 证书（只读，安全）
      - cs_ssl_data:/etc/coturn/ssl-src:ro
      # 日志长效存储到 /srv/cs-data/logs/coturn/，重启 / deploy 不丢
      - ${HOST_DATA_DIR:-/srv/cs-data}/logs/coturn:/var/log/coturn

  nginx:
    build:
      context: ./nginx
    container_name: cs-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      admin:
        condition: service_started
      widget:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ENABLE_HTTPS: ${ENABLE_HTTPS:-true}
      # Let's Encrypt 自动证书申请的邮箱（必填，否则只跑 HTTP）。
      # 用于证书到期通知；不验证邮箱本身，但必须是合法格式。
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      # nginx 日志 bind 到仓库外（铁律：日志要能宿主机直接查看）
      - ${HOST_DATA_DIR:-/srv/cs-data}/logs/nginx:/var/log/nginx
      # SSL 证书改为 named volume，acme.sh 自动写入。
      # 不再用仓库目录 bind mount，避免 deploy 时被清空。
      - cs_ssl_data:/etc/nginx/ssl
      # acme.sh 账户密钥 + 配置（首次注册账户后必须持久化，否则次次重新注册会撞 LE 配额）
      - cs_acme_data:/opt/acme.sh
    networks: [cs-net]

volumes:
  cs_mysql_data:
    name: cs_mysql_data
  cs_redis_data:
    name: cs_redis_data
  # SSL 证书持久化：acme.sh 申请的证书 + 私钥都在这里
  cs_ssl_data:
    name: cs_ssl_data
  # acme.sh 账户密钥 / 配置持久化：避免重启容器后丢账户撞 Let's Encrypt 配额
  cs_acme_data:
    name: cs_acme_data

networks:
  cs-net:
    name: cs-net
    driver: bridge
