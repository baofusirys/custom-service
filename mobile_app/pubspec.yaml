name: custom_service_app
description: Custom Service 客服工作台 - Flutter 双端 App (iOS + Android)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # HTTP 客户端
  dio: ^5.4.0
  # WebSocket
  web_socket_channel: ^2.4.0
  # 状态管理（轻量 Provider）
  provider: ^6.1.1
  # 本地持久化（URL、token、agent）
  shared_preferences: ^2.2.2
  # 时间格式化
  intl: ^0.19.0
  # 本地通知（Android 前台通知 + iOS 本地提示）
  flutter_local_notifications: ^17.0.0
  # 第 3 批用：推送（前端 SDK）
  # firebase_core: ^2.27.0       # Android FCM
  # firebase_messaging: ^14.7.20  # Android FCM
  # 内置音频用 just_audio 或 audioplayers；这里用 Web Audio 类似的程序合成（避免引入 audio 包）
  # 实际开发可换成 audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
