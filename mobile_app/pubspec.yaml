name: custom_service_app
description: Custom Service 客服工作台 - Flutter 双端 App (iOS + Android)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # HTTP 客户端
  dio: ^5.4.0
  # WebSocket
  web_socket_channel: ^2.4.0
  # 状态管理（轻量 Provider）
  provider: ^6.1.1
  # 本地持久化（URL、token、agent）
  shared_preferences: ^2.2.2
  # 时间格式化
  intl: ^0.19.0
  # 音频：播放程序合成的 WAV 字节流（无外部文件，跟 Web 端 11 种音色一致）
  # 6.x：修复了 iOS 17+ 的 BytesSource 兼容问题，5.2.1 在 iOS 26 上 silent fail
  audioplayers: ^6.6.0
  # WebRTC：双端语音通话（visitor 拨号、agent/App 接听）
  # 大依赖 ~50MB iOS framework，但只在通话时占用麦克风+音频
  flutter_webrtc: ^0.11.7
  # 本地通知（[022] 再加，需要 Android core library desugaring）
  # flutter_local_notifications: ^17.0.0
  # 推送（[022] 再加）
  # firebase_core: ^2.27.0
  # firebase_messaging: ^14.7.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # 真实录音的通知音色文件，三端共用（admin/public/sounds、widget/public/sounds、本目录）
  assets:
    - assets/sounds/
