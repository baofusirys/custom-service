<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Service Widget · Demo</title>
  <style>
    body { font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fa; }
    .container { max-width: 720px; margin: 60px auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    pre { background: #2d2d2d; color: #f5f5f5; padding: 16px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
    .ok { color: #67C23A; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Custom Service · Widget Demo</h1>
    <p>页面右下角应该出现 <span class="ok">「在线客服」</span> 按钮。点击它即可打开聊天框。</p>
    <p>把下面这一行复制到任意第三方网站的 <code>&lt;/body&gt;</code> 前即可启用：</p>
    <pre>&lt;script src="<span id="origin"></span>/widget/loader.js"
        data-cs-endpoint="<span id="endpoint"></span>"
        data-cs-site="default" defer&gt;&lt;/script&gt;</pre>
    <p>更多用法见 <a href="/">主站</a> 的 <code>docs/INTEGRATION.md</code>。</p>
  </div>
<script>
  document.getElementById('origin').textContent = location.origin;
  document.getElementById('endpoint').textContent = location.origin.replace(/^http/, 'ws');
</script>
<!-- 把 widget 加到本页 -->
<script src="/widget/loader.js"
        data-cs-endpoint=""
        data-cs-site="default" defer></script>
<script>
  // demo 页运行时把 endpoint 填回去
  document.currentScript.previousElementSibling.setAttribute('data-cs-endpoint',
    location.origin.replace(/^http/, 'ws'));
</script>
</body>
</html>
