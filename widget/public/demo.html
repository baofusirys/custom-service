<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Service · 首页</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #f5f7fa;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Microsoft YaHei", sans-serif; color: #2c3034;
    }
    nav {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 12px 24px;
      display: flex; align-items: center; gap: 24px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    nav .brand { font-weight: 700; font-size: 18px; color: #2974ff; }
    nav a {
      color: #4b5563; text-decoration: none; font-size: 14px;
      padding: 6px 10px; border-radius: 6px; transition: background .15s;
    }
    nav a:hover { background: #f3f4f6; color: #2974ff; }
    nav a.active { color: #2974ff; background: #eff6ff; }
    main { max-width: 880px; margin: 40px auto; padding: 0 24px; }
    .hero {
      background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
      color: #fff; padding: 48px 32px; border-radius: 16px;
      box-shadow: 0 8px 24px rgba(41,116,255,.18);
    }
    .hero h1 { margin: 0 0 12px; font-size: 32px; }
    .hero p { margin: 0; opacity: .92; font-size: 16px; }
    .card {
      background: #fff; padding: 28px; border-radius: 12px;
      margin-top: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .card h2 { margin: 0 0 12px; font-size: 20px; }
    .card pre {
      background: #1f2937; color: #f3f4f6; padding: 16px;
      border-radius: 8px; overflow-x: auto; font-size: 13px;
    }
    .tip { color: #92400e; background: #fff7ed; border: 1px solid #fed7aa;
      padding: 10px 14px; border-radius: 8px; margin-top: 16px; font-size: 14px; }
    footer { text-align: center; padding: 32px 0; color: #9ca3af; font-size: 13px; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Custom Service Demo</span>
    <a href="/widget/demo.html" class="active">首页</a>
    <a href="/widget/demo-products.html">产品</a>
    <a href="/widget/demo-pricing.html">价格</a>
    <a href="/widget/demo-contact.html">联系我们</a>
  </nav>
  <main>
    <div class="hero">
      <h1>欢迎来到 Custom Service 演示站</h1>
      <p>页面右下角应该出现「在线客服」按钮 —— 点击它就能跟客服实时对话。试着在顶部导航之间跳转，客服后台会跟踪您访问的每个页面。</p>
    </div>
    <div class="card">
      <h2>如何集成到您自己的网站</h2>
      <p>把下面这一行复制到任意 HTML 页面的 <code>&lt;/body&gt;</code> 前即可启用：</p>
      <pre><span id="snippet"></span></pre>
      <div class="tip">提示：访客在 4 个 demo 页面之间跳转时，客服后台会实时显示「访客访问了 XXX」橙色横幅，这就是页面跟踪。</div>
    </div>
  </main>
  <footer>Custom Service · v0.3 · <a href="/" style="color:#9ca3af">主站</a></footer>

  <script>
    document.getElementById('snippet').textContent =
      '<script src="' + location.origin + '/widget/loader.js"\n' +
      '        data-cs-endpoint="' + location.origin.replace(/^http/, 'ws') + '"\n' +
      '        data-cs-site="default" defer><\/script>';
  </script>
  <script src="/widget/loader.js" data-cs-site="default" defer></script>
</body>
</html>
