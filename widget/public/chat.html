<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线客服</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: #f7f8fa;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #2c3034;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  #app { display: flex; flex-direction: column; height: 100%; }

  /* ========== 顶部栏 ========== */
  header {
    height: 60px; flex-shrink: 0;
    background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
    color: #fff; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; box-shadow: 0 2px 8px rgba(41,116,255,.18);
    position: relative; z-index: 2;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.22); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
  }
  .header-text { display: flex; flex-direction: column; line-height: 1.2; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-status { font-size: 12px; opacity: .9; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
    box-shadow: 0 0 0 2px rgba(74,222,128,.3);
  }
  .dot.off { background: #f87171; box-shadow: 0 0 0 2px rgba(248,113,113,.3); }
  .close-btn {
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; opacity: .85; transition: background .15s, opacity .15s;
  }
  .close-btn:hover { background: rgba(255,255,255,.16); opacity: 1; }

  /* ========== 消息区 ========== */
  #list {
    flex: 1; overflow-y: auto; padding: 14px 14px 8px;
    background: #f7f8fa;
    scroll-behavior: smooth;
  }
  #list::-webkit-scrollbar { width: 6px; }
  #list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  #list::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

  .time-divider {
    text-align: center; margin: 14px 0 10px;
    font-size: 11px; color: #9ca3af; user-select: none;
  }
  .time-divider span {
    background: #e5e7eb; padding: 3px 12px; border-radius: 10px;
  }

  /* 系统提示（chip） */
  .sys-chip {
    margin: 10px auto; max-width: 82%;
    background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa;
    padding: 6px 12px; border-radius: 14px; font-size: 12px;
    text-align: center; line-height: 1.5;
  }

  /* ========== 消息组 ========== */
  .msg-group { margin-bottom: 4px; }

  .msg-line {
    display: flex; align-items: flex-end;
    gap: 10px;            /* 头像与气泡间距 */
    margin-top: 8px;      /* 不同组之间的间距 */
    padding: 0 2px;
  }
  .msg-line.mine { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff;
    background: #94a3b8;
    box-shadow: 0 1px 2px rgba(15,23,42,.06);
  }
  .msg-avatar.agent { background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%); }
  .msg-avatar.visitor { background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%); }

  /*
   * msg-stack 关键设计：
   *   - align-items: flex-start/end 让每条气泡按自己的内容宽度自适应
   *     （短消息窄、长消息宽，互不影响）—— 修复了"新消息撑开旧消息"的 Bug
   *   - max-width 限制整组不超出可视区域
   */
  .msg-stack {
    display: flex; flex-direction: column;
    gap: 3px;
    max-width: calc(100% - 54px);   /* 留出头像 34px + gap 10px + 余量 */
    min-width: 0;
    align-items: flex-start;
  }
  .msg-line.mine .msg-stack { align-items: flex-end; }

  /* ========== 气泡 ========== */
  .bubble {
    display: inline-block;          /* 关键：宽度跟随内容 */
    max-width: 100%;
    padding: 9px 14px;
    border-radius: 18px;
    line-height: 1.55;
    word-break: break-word; white-space: pre-wrap;
    font-size: 14px;
    box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .msg-line.mine .bubble {
    background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
    color: #fff;
  }
  .msg-line.theirs .bubble {
    background: #fff; color: #2c3034;
    border: 1px solid #e5e7eb;
  }

  /* 同组多条气泡的"chain" 视觉：
   *   - 非最后一条：靠头像那侧的下角小圆角，连接下一条
   *   - 最后一条：靠头像那侧的下角变成"尾巴"
   */
  .msg-line.mine .bubble:not(:last-child) { border-bottom-right-radius: 6px; }
  .msg-line.theirs .bubble:not(:last-child) { border-bottom-left-radius: 6px; }
  .msg-line.mine .bubble:last-child { border-bottom-right-radius: 5px; }
  .msg-line.theirs .bubble:last-child { border-bottom-left-radius: 5px; }

  /* 图片气泡：边距收紧，让图片自身做主 */
  .bubble.bubble-image {
    padding: 4px;
    border-radius: 14px;
  }
  .bubble.bubble-image .img-msg {
    display: block;
    max-width: 220px; max-height: 220px;
    border-radius: 10px; cursor: pointer;
  }

  /* 文件卡片 */
  .file-card {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none; color: inherit;
    min-width: 180px;
  }
  .file-card .ico {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,.2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .msg-line.theirs .file-card .ico { background: #eff6ff; color: #2974ff; }
  .file-card .meta { display: flex; flex-direction: column; min-width: 0; }
  .file-card .name {
    font-size: 13px; font-weight: 500;
    max-width: 170px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .file-card .sub { font-size: 11px; opacity: .75; margin-top: 2px; }

  /* ========== 底部输入 ========== */
  footer {
    flex-shrink: 0; background: #fff; border-top: 1px solid #e5e7eb;
    padding: 10px 12px;
  }
  .input-wrap {
    background: #f3f4f6; border-radius: 10px; padding: 8px 10px;
    transition: background .15s, box-shadow .15s;
  }
  .input-wrap:focus-within {
    background: #fff;
    box-shadow: 0 0 0 2px rgba(74,144,255,.2);
  }
  textarea {
    width: 100%; resize: none; border: 0; outline: none;
    background: transparent; font: inherit; color: #2c3034;
    min-height: 38px; max-height: 100px; line-height: 1.5;
    padding: 0;
  }
  textarea::placeholder { color: #9ca3af; }
  .actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px;
  }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 0; cursor: pointer;
    background: transparent; color: #6b7280;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .icon-btn:hover { background: #f3f4f6; color: #2974ff; }
  .send-btn {
    border: 0; cursor: pointer; height: 32px; padding: 0 16px;
    border-radius: 8px; font: inherit; font-size: 13px; font-weight: 500;
    background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
    color: #fff; transition: opacity .15s, transform .05s;
  }
  .send-btn:hover { opacity: .92; }
  .send-btn:active { transform: scale(.97); }
  .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }
</style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <div class="header-avatar" id="hAvatar">客</div>
        <div class="header-text">
          <span class="header-title">在线客服</span>
          <span class="header-status"><span class="dot" id="dot"></span><span id="status">连接中…</span></span>
        </div>
      </div>
      <div class="close-btn" id="closeBtn" title="收起">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </div>
    </header>

    <div id="list"></div>

    <footer>
      <div class="input-wrap">
        <textarea id="input" placeholder="输入消息，回车发送，Shift+回车换行"></textarea>
      </div>
      <div class="actions">
        <div>
          <button class="icon-btn" id="fileBtn" title="发送附件 / 图片">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input type="file" id="fileInput" style="display:none">
        </div>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
    </footer>
  </div>

<script>
(function () {
  // ====== 配置 ======
  var qs = new URLSearchParams(location.search);
  var endpoint = qs.get('endpoint') || location.origin;
  var siteID = qs.get('site') || 'default';
  var httpBase = endpoint.replace(/^wss?:\/\//, function (m) {
    return m === 'wss://' ? 'https://' : 'http://';
  });

  var STORE_KEY = 'cs_visitor_' + siteID;
  var stored = (function () {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || 'null'); }
    catch { return null; }
  })();

  var visitorID = stored?.visitor_id || '';
  var convID = '';
  var token = '';
  var ws = null;
  var alive = false;
  var retry = 0;
  var unread = 0;
  var pingTimer = null;
  var lastGroup = null; // 最近一组消息的元数据，用于合并
  var notifySound = 'classic'; // 通知声音，启动时拉服务端覆盖
  var audioCtx = null;

  // ====== DOM ======
  var listEl = document.getElementById('list');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('sendBtn');
  var fileBtn = document.getElementById('fileBtn');
  var fileInput = document.getElementById('fileInput');
  var statusEl = document.getElementById('status');
  var dotEl = document.getElementById('dot');
  var closeBtn = document.getElementById('closeBtn');

  closeBtn.onclick = function () { parent.postMessage({ __cs: 1, type: 'close' }, '*'); };
  fileBtn.onclick = function () { fileInput.click(); };
  fileInput.onchange = onPickFile;
  sendBtn.onclick = sendText;
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
  inputEl.addEventListener('input', function () {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(100, inputEl.scrollHeight) + 'px';
  });

  function setStatus(text, ok) {
    statusEl.textContent = text;
    dotEl.classList.toggle('off', !ok);
  }

  // ====== 通知声音（Web Audio API 程序合成） ======
  var SOUND_DEFS = {
    classic: function (ctx) { tone(ctx, 880, 0.18, 'sine', 0.3); },
    chime:   function (ctx) { seq(ctx, [{f:1320,d:0.08},{f:990,d:0.18}], 'sine', 0.3); },
    ding:    function (ctx) { seq(ctx, [{f:587,d:0.1},{f:784,d:0.18}], 'sine', 0.35); },
    soft:    function (ctx) { tone(ctx, 523, 0.35, 'triangle', 0.22); },
    alert:   function (ctx) { seq(ctx, [{f:700,d:0.06},{f:0,d:0.04},{f:700,d:0.06},{f:0,d:0.04},{f:700,d:0.1}], 'sine', 0.28); },
    none:    function () {}
  };
  function getAudio() {
    if (audioCtx && audioCtx.state !== 'closed') return audioCtx;
    try {
      var C = window.AudioContext || window.webkitAudioContext;
      if (!C) return null;
      audioCtx = new C();
      return audioCtx;
    } catch { return null; }
  }
  function tone(ctx, freq, dur, type, vol) {
    var o = ctx.createOscillator(), g = ctx.createGain(), t0 = ctx.currentTime;
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function seq(ctx, notes, type, vol) {
    var t = ctx.currentTime;
    notes.forEach(function (n) {
      if (n.f <= 0) { t += n.d; return; }
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.value = n.f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + n.d);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + n.d + 0.02);
      t += n.d;
    });
  }
  var lastPlay = 0;
  function playNotify() {
    if (!notifySound || notifySound === 'none') return;
    var now = Date.now();
    if (now - lastPlay < 500) return; // 500ms 防抖
    lastPlay = now;
    var def = SOUND_DEFS[notifySound];
    if (!def) return;
    var ctx = getAudio();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume().catch(function(){});
    try { def(ctx); } catch {}
  }
  // 浏览器要求音频必须用户手势触发；用户在聊天框点击就算
  document.addEventListener('click', function () {
    var ctx = getAudio();
    if (ctx && ctx.state === 'suspended') ctx.resume().catch(function(){});
  }, { once: true, capture: true });

  // ====== 时间格式化 ======
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function fmtAbs(ts) {
    var d = new Date(ts);
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
      ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }
  function fmtGroupTime(ts) {
    var d = new Date(ts), now = new Date();
    var sameDay = d.getFullYear() === now.getFullYear() &&
                  d.getMonth() === now.getMonth() &&
                  d.getDate() === now.getDate();
    if (sameDay) return '今天 ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    var yest = new Date(now.getFullYear(), now.getMonth(), now.getDate()-1);
    if (d.getFullYear() === yest.getFullYear() &&
        d.getMonth() === yest.getMonth() &&
        d.getDate() === yest.getDate()) {
      return '昨天 ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    return pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function escape(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ====== 渲染 ======
  function renderTimeDivider(ts) {
    var d = document.createElement('div');
    d.className = 'time-divider';
    d.innerHTML = '<span>' + escape(fmtGroupTime(ts)) + '</span>';
    listEl.appendChild(d);
  }

  function renderSys(text) {
    var d = document.createElement('div');
    d.className = 'sys-chip';
    d.textContent = text;
    listEl.appendChild(d);
    listEl.scrollTop = listEl.scrollHeight;
    lastGroup = null;
  }

  function buildBubble(m, isMine) {
    var b = document.createElement('div');
    b.className = 'bubble';
    b.title = fmtAbs(m.created_at || m.ts || Date.now());

    var mediaURL = m.media_url?.String || m.media_url || m.media || '';
    var mediaKind = m.media_kind?.String || m.media_kind || m.mkind || '';
    var mediaName = m.media_name?.String || m.media_name || m.mname || '';

    if (mediaURL && mediaKind === 'image') {
      b.classList.add('bubble-image');
      var img = document.createElement('img');
      img.className = 'img-msg';
      img.src = httpBase + mediaURL;
      img.onclick = function () { window.open(httpBase + mediaURL, '_blank'); };
      b.appendChild(img);
    } else if (mediaURL) {
      var a = document.createElement('a');
      a.className = 'file-card';
      a.target = '_blank';
      a.href = httpBase + mediaURL;
      a.innerHTML =
        '<span class="ico">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">' +
            '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/>' +
          '</svg>' +
        '</span>' +
        '<span class="meta">' +
          '<span class="name">' + escape(mediaName || '附件') + '</span>' +
          '<span class="sub">点击下载</span>' +
        '</span>';
      b.appendChild(a);
    }
    if (m.content) {
      var t = document.createElement('span');
      t.textContent = m.content;
      t.style.display = 'block';
      b.appendChild(t);
    }
    return b;
  }

  function render(m) {
    var isMine = m.sender === 'visitor';
    var ts = new Date(m.created_at || m.ts || Date.now()).getTime();

    // 与上一组同发送者且 < 5 分钟，则合并到同一 line（隐藏头像）
    if (lastGroup && lastGroup.isMine === isMine && (ts - lastGroup.ts) < 5 * 60 * 1000) {
      var bubble = buildBubble(m, isMine);
      lastGroup.bubbles.appendChild(bubble);
      lastGroup.ts = ts;
    } else {
      // 新组：先时间分隔条
      if (!lastGroup || (ts - lastGroup.ts) > 5 * 60 * 1000) {
        renderTimeDivider(ts);
      }
      var line = document.createElement('div');
      line.className = 'msg-line ' + (isMine ? 'mine' : 'theirs');

      var avatar = document.createElement('div');
      avatar.className = 'msg-avatar ' + (isMine ? 'visitor' : 'agent');
      avatar.textContent = isMine ? '我' : '客';
      line.appendChild(avatar);

      var stack = document.createElement('div');
      stack.className = 'msg-stack';
      line.appendChild(stack);

      var bubble = buildBubble(m, isMine);
      stack.appendChild(bubble);

      listEl.appendChild(line);
      lastGroup = { isMine: isMine, ts: ts, bubbles: stack };
    }
    listEl.scrollTop = listEl.scrollHeight;
  }

  // ====== 启动 ======
  async function loadPublicSettings() {
    try {
      var r = await fetch(httpBase + '/api/visitor/settings');
      var data = await r.json();
      if (data.code === 0 && data.data) {
        notifySound = data.data.notify_sound || 'classic';
        if (data.data.widget_title) {
          var titleEl = document.querySelector('header .header-title');
          if (titleEl) titleEl.textContent = data.data.widget_title;
        }
      }
    } catch {}
  }

  async function bootstrap() {
    await loadPublicSettings();
    try {
      var resp = await fetch(httpBase + '/api/visitor/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          visitor_id: visitorID,
          site_id: siteID,
          referer: document.referrer || '',
          last_page: parent.location ? parent.location.href : '',
          ua: navigator.userAgent
        })
      });
      var data = await resp.json();
      if (data.code !== 0) throw new Error(data.msg || '会话创建失败');
      visitorID = data.visitor_id;
      convID = data.conversation;
      token = data.visitor_token;
      localStorage.setItem(STORE_KEY, JSON.stringify({ visitor_id: visitorID }));
      loadHistoryFromCache();
      // 服务端在新会话时回了 greeting 文本 —— 直接渲染，规避 WSS 时序丢消息
      if (data.greeting) {
        var gm = {
          sender: 'agent',
          content: data.greeting,
          created_at: new Date().toISOString()
        };
        render(gm); persistMsg(gm);
      }
      connectWS();
    } catch (e) {
      setStatus('连接失败，重试中', false);
      setTimeout(bootstrap, 5000);
    }
  }

  function loadHistoryFromCache() {
    try {
      var cache = JSON.parse(localStorage.getItem(STORE_KEY + '_msgs') || '[]');
      cache.slice(-50).forEach(render);
    } catch {}
  }

  function persistMsg(m) {
    try {
      var cache = JSON.parse(localStorage.getItem(STORE_KEY + '_msgs') || '[]');
      cache.push(m);
      if (cache.length > 200) cache = cache.slice(-200);
      localStorage.setItem(STORE_KEY + '_msgs', JSON.stringify(cache));
    } catch {}
  }

  function connectWS() {
    var url = endpoint.replace(/^https?:\/\//, function (m) {
      return m === 'https://' ? 'wss://' : 'ws://';
    }) + '/ws/visitor?token=' + encodeURIComponent(token);
    ws = new WebSocket(url);
    ws.onopen = function () {
      alive = true; retry = 0;
      setStatus('在线', true);
      pingTimer = setInterval(function () {
        if (alive) try { ws.send(JSON.stringify({ type: 'ping', ts: Date.now() })); } catch {}
      }, 30000);
    };
    ws.onmessage = function (ev) {
      var env;
      try { env = JSON.parse(ev.data); } catch { return; }
      if (env.type === 'pong') return;
      if (env.type === 'hello') { renderSys('您已接入客服，请描述您的问题'); return; }
      if (env.type === 'error') { renderSys('系统：' + (env.content || '')); return; }
      if (env.type === 'chat') {
        if (env.from && env.from.indexOf('visitor:') === 0) return;
        var m = {
          sender: 'agent',
          content: env.content || '',
          media_url: env.media || '',
          media_kind: env.mkind || '',
          media_name: env.mname || '',
          created_at: new Date(env.ts || Date.now()).toISOString()
        };
        render(m); persistMsg(m);
        playNotify(); // 收到客服 / 系统消息播声
        if (document.visibilityState !== 'visible' || parent !== window) {
          unread++;
          parent.postMessage({ __cs: 1, type: 'unread', count: unread }, '*');
        }
      }
    };
    ws.onclose = function () {
      alive = false;
      clearInterval(pingTimer);
      setStatus('已断开，重连中', false);
      var backoff = Math.min(30000, 1000 * Math.pow(1.6, retry++));
      setTimeout(connectWS, backoff);
    };
    ws.onerror = function () { try { ws.close(); } catch {} };
  }

  function sendText() {
    var text = inputEl.value.trim();
    if (!text) return;
    if (!alive) { setStatus('未连接', false); return; }
    ws.send(JSON.stringify({ type: 'chat', conv: convID, content: text, ts: Date.now(), prio: 0 }));
    var m = { sender: 'visitor', content: text, created_at: new Date().toISOString() };
    render(m); persistMsg(m);
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  async function onPickFile(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var fd = new FormData();
    fd.append('file', file);
    fd.append('uploader', 'visitor');
    try {
      var r = await fetch(httpBase + '/api/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: fd
      });
      var data = await r.json();
      if (data.code !== 0) throw new Error(data.msg);
      ws.send(JSON.stringify({
        type: 'chat', conv: convID, content: '',
        media: data.url, mkind: data.kind, mname: data.name, msize: data.size,
        ts: Date.now(), prio: 0
      }));
      var m = {
        sender: 'visitor', content: '',
        media_url: data.url, media_kind: data.kind, media_name: data.name,
        created_at: new Date().toISOString()
      };
      render(m); persistMsg(m);
    } catch (err) {
      renderSys('文件发送失败：' + (err.message || ''));
    }
    e.target.value = '';
  }

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') {
      unread = 0;
      parent.postMessage({ __cs: 1, type: 'unread', count: 0 }, '*');
    }
  });

  bootstrap();
})();
</script>
</body>
</html>
