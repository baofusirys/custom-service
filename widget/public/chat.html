<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线客服</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: #f7f8fa;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #2c3034;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  #app { display: flex; flex-direction: column; height: 100%; }

  /* ========== 顶部栏 ========== */
  header {
    height: 60px; flex-shrink: 0;
    background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
    color: #fff; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; box-shadow: 0 2px 8px rgba(41,116,255,.18);
    position: relative; z-index: 2;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.22); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
  }
  .header-text { display: flex; flex-direction: column; line-height: 1.2; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-status { font-size: 12px; opacity: .9; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
    box-shadow: 0 0 0 2px rgba(74,222,128,.3);
  }
  .dot.off { background: #f87171; box-shadow: 0 0 0 2px rgba(248,113,113,.3); }
  .close-btn {
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; opacity: .85; transition: background .15s, opacity .15s;
  }
  .close-btn:hover { background: rgba(255,255,255,.16); opacity: 1; }

  /* ========== 消息区 ========== */
  #list {
    flex: 1; overflow-y: auto; padding: 14px 14px 8px;
    background: #f7f8fa;
    scroll-behavior: smooth;
  }
  #list::-webkit-scrollbar { width: 6px; }
  #list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  #list::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

  .time-divider {
    text-align: center; margin: 14px 0 10px;
    font-size: 11px; color: #9ca3af; user-select: none;
  }
  .time-divider span {
    background: #e5e7eb; padding: 3px 12px; border-radius: 10px;
  }

  /* 系统提示（chip） */
  .sys-chip {
    margin: 10px auto; max-width: 82%;
    background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa;
    padding: 6px 12px; border-radius: 14px; font-size: 12px;
    text-align: center; line-height: 1.5;
  }

  /* ========== 消息组 ========== */
  .msg-group { margin-bottom: 4px; }

  .msg-line {
    display: flex; align-items: flex-end;
    gap: 10px;            /* 头像与气泡间距 */
    margin-top: 8px;      /* 不同组之间的间距 */
    padding: 0 2px;
  }
  .msg-line.mine { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff;
    background: #94a3b8;
    box-shadow: 0 1px 2px rgba(15,23,42,.06);
  }
  .msg-avatar.agent { background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%); }
  .msg-avatar.visitor { background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%); }

  /*
   * msg-stack 关键设计：
   *   - align-items: flex-start/end 让每条气泡按自己的内容宽度自适应
   *     （短消息窄、长消息宽，互不影响）—— 修复了"新消息撑开旧消息"的 Bug
   *   - max-width 限制整组不超出可视区域
   */
  .msg-stack {
    display: flex; flex-direction: column;
    gap: 3px;
    max-width: calc(100% - 54px);   /* 留出头像 34px + gap 10px + 余量 */
    min-width: 0;
    align-items: flex-start;
  }
  .msg-line.mine .msg-stack { align-items: flex-end; }

  /* ========== 气泡 ========== */
  .bubble {
    position: relative;             /* 给 .bubble-copy 用 */
    display: inline-block;          /* 关键：宽度跟随内容 */
    max-width: 100%;
    padding: 9px 14px;
    border-radius: 18px;
    line-height: 1.55;
    word-break: break-word; white-space: pre-wrap;
    font-size: 14px;
    box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .msg-line.mine .bubble {
    background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
    color: #fff;
  }
  .msg-line.theirs .bubble {
    background: #fff; color: #2c3034;
    border: 1px solid #e5e7eb;
  }
  /* 消息复制按钮：默认 opacity:0，hover 气泡时出现 */
  .bubble-copy {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 5px;
    opacity: 0; transition: opacity .15s, background .15s;
    cursor: pointer;
    color: #94a3b8; background: rgba(255,255,255,.85);
  }
  .bubble:hover .bubble-copy,
  .bubble:active .bubble-copy { opacity: 1; }    /* 移动端 touch 也能显示 */
  .bubble-copy:hover { background: rgba(0,0,0,.06); color: #2974ff; }
  .msg-line.mine .bubble-copy { color: #e0ecff; background: rgba(255,255,255,.18); }
  .msg-line.mine .bubble-copy:hover { background: rgba(255,255,255,.32); color: #fff; }
  .bubble-copy--done { background: #10b981 !important; color: #fff !important; opacity: 1 !important; }

  /* ====== 语音通话浮窗 ====== */
  .voice-panel {
    position: absolute; inset: 0;
    z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #1e3a8a 0%, #2974ff 100%);
    color: #fff; padding: 20px;
    animation: voice-fade-in .25s ease-out;
  }
  @keyframes voice-fade-in {
    from { opacity: 0; transform: scale(.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .voice-panel .voice-icon {
    width: 88px; height: 88px; border-radius: 50%;
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
    animation: voice-pulse 1.6s ease-in-out infinite;
  }
  @keyframes voice-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.35); }
    50%      { box-shadow: 0 0 0 18px rgba(255,255,255,0); }
  }
  .voice-panel.voice-panel--talking .voice-icon { animation: none; background: rgba(16,185,129,.25); }
  .voice-panel.voice-panel--ended .voice-icon  { animation: none; background: rgba(255,255,255,.12); }
  .voice-target { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .voice-status { font-size: 14px; opacity: .85; margin-bottom: 32px; }
  .voice-hang {
    width: 60px; height: 60px; border-radius: 50%; border: none;
    background: #ef4444; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(239,68,68,.45);
    transition: background .15s, transform .1s;
  }
  .voice-hang:hover { background: #dc2626; }
  .voice-hang:active { transform: scale(.95); }
  .voice-panel.voice-panel--ended .voice-hang { display: none; }
  #voiceRemoteAudio { display: none; }


  /* 同组多条气泡的"chain" 视觉：
   *   - 非最后一条：靠头像那侧的下角小圆角，连接下一条
   *   - 最后一条：靠头像那侧的下角变成"尾巴"
   */
  .msg-line.mine .bubble:not(:last-child) { border-bottom-right-radius: 6px; }
  .msg-line.theirs .bubble:not(:last-child) { border-bottom-left-radius: 6px; }
  .msg-line.mine .bubble:last-child { border-bottom-right-radius: 5px; }
  .msg-line.theirs .bubble:last-child { border-bottom-left-radius: 5px; }

  /* 图片气泡：边距收紧，让图片自身做主 */
  .bubble.bubble-image {
    padding: 4px;
    border-radius: 14px;
  }
  .bubble.bubble-image .img-msg {
    display: block;
    max-width: 220px; max-height: 220px;
    border-radius: 10px; cursor: pointer;
  }

  /* 已读 / 未读 角标 */
  .read-indicator {
    font-size: 11px; color: #9ca3af;
    margin: 3px 2px 0 0;
    user-select: none;
  }

  /* 文件卡片 */
  .file-card {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none; color: inherit;
    min-width: 180px;
  }
  .file-card .ico {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,.2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .msg-line.theirs .file-card .ico { background: #eff6ff; color: #2974ff; }
  .file-card .meta { display: flex; flex-direction: column; min-width: 0; }
  .file-card .name {
    font-size: 13px; font-weight: 500;
    max-width: 170px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .file-card .sub { font-size: 11px; opacity: .75; margin-top: 2px; }

  /* ========== 底部输入 ========== */
  footer {
    flex-shrink: 0; background: #fff; border-top: 1px solid #e5e7eb;
    padding: 10px 12px;
  }
  .input-wrap {
    background: #f3f4f6; border-radius: 10px; padding: 8px 10px;
    transition: background .15s, box-shadow .15s;
  }
  .input-wrap:focus-within {
    background: #fff;
    box-shadow: 0 0 0 2px rgba(74,144,255,.2);
  }
  textarea {
    width: 100%; resize: none; border: 0; outline: none;
    background: transparent; font: inherit; color: #2c3034;
    min-height: 38px; max-height: 100px; line-height: 1.5;
    padding: 0;
  }
  textarea::placeholder { color: #9ca3af; }
  .actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px;
  }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 0; cursor: pointer;
    background: transparent; color: #6b7280;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .icon-btn:hover { background: #f3f4f6; color: #2974ff; }
  /* 语音按钮 pill 样式（图标 + 文字横排），区别于纯图标按钮 */
  .voice-btn-pill {
    height: 32px; padding: 0 10px 0 8px;
    border-radius: 16px; border: 0; cursor: pointer;
    background: #eef4ff; color: #2974ff;
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; line-height: 1; font-weight: 500;
    margin-left: 6px;
    transition: background .15s, color .15s;
  }
  .voice-btn-pill:hover { background: #dbeafe; }
  .voice-btn-hint { white-space: nowrap; }
  .send-btn {
    border: 0; cursor: pointer; height: 32px; padding: 0 16px;
    border-radius: 8px; font: inherit; font-size: 13px; font-weight: 500;
    background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
    color: #fff; transition: opacity .15s, transform .05s;
  }
  .send-btn:hover { opacity: .92; }
  .send-btn:active { transform: scale(.97); }
  .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }
</style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <div class="header-avatar" id="hAvatar">客</div>
        <div class="header-text">
          <span class="header-title">在线客服</span>
          <span class="header-status"><span class="dot" id="dot"></span><span id="status">连接中…</span></span>
        </div>
      </div>
      <div class="close-btn" id="closeBtn" title="收起">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </div>
    </header>

    <div id="list"></div>

    <footer>
      <div class="input-wrap">
        <textarea id="input" placeholder="输入消息，回车发送，Shift+回车换行"></textarea>
      </div>
      <div class="actions">
        <div>
          <button class="icon-btn" id="fileBtn" title="发送附件 / 图片">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input type="file" id="fileInput" style="display:none">
          <button class="voice-btn-pill" id="voiceBtn" title="语音通话">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <span class="voice-btn-hint" id="voiceBtnHint">直接呼叫客服</span>
          </button>
        </div>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
    </footer>

    <!-- 语音通话浮窗（覆盖在 widget 顶部，呼叫中/通话中显示） -->
    <div id="voicePanel" class="voice-panel" style="display:none">
      <div class="voice-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="voice-target">客服</div>
      <div class="voice-status">拨号中...</div>
      <button class="voice-hang" id="voiceHangBtn" title="挂断">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/>
          <line x1="22" y1="2" x2="2" y2="22"/>
        </svg>
      </button>
      <!-- 远端音频流挂载点，autoplay 在用户点击「呼叫」手势之后允许 -->
      <audio id="voiceRemoteAudio" autoplay playsinline></audio>
    </div>
  </div>

<script>
(function () {
  // ====== 配置 ======
  var qs = new URLSearchParams(location.search);
  var endpoint = qs.get('endpoint') || location.origin;
  var siteID = qs.get('site') || 'default';
  var httpBase = endpoint.replace(/^wss?:\/\//, function (m) {
    return m === 'wss://' ? 'https://' : 'http://';
  });

  var STORE_KEY = 'cs_visitor_' + siteID;
  var stored = (function () {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || 'null'); }
    catch { return null; }
  })();

  var visitorID = stored?.visitor_id || '';
  var convID = '';
  var token = '';
  var ws = null;
  var alive = false;
  var retry = 0;
  var unread = 0;
  var pingTimer = null;
  var lastGroup = null; // 最近一组消息的元数据，用于合并
  var notifySound = 'visitor1'; // 通知声音，启动时拉服务端覆盖；旧 key (classic/chime/...) 在 playNotify 内 fallback 到 visitor1
  // widget 是否处于打开状态。loader.js 通过 postMessage('widget_state') 通知。
  // 默认 false（页面刚加载时 iframe 在但 widget 收起）；打开时清零未读。
  var isWidgetOpen = false;
  // 宿主页 URL / title，loader.js 通过 postMessage('page_info') 推过来。
  // WSS 上线后会发一条 page 消息让客服后台看到访客访问了哪个页面。
  var hostURL = '';
  var hostTitle = '';
  var pageReported = ''; // 已经上报过的 URL，避免重复发

  // ====== DOM ======
  var listEl = document.getElementById('list');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('sendBtn');
  var fileBtn = document.getElementById('fileBtn');
  var fileInput = document.getElementById('fileInput');
  var statusEl = document.getElementById('status');
  var dotEl = document.getElementById('dot');
  var closeBtn = document.getElementById('closeBtn');

  closeBtn.onclick = function () { parent.postMessage({ __cs: 1, type: 'close' }, '*'); };
  fileBtn.onclick = function () { fileInput.click(); };
  fileInput.onchange = onPickFile;
  // 语音通话按钮 / 挂断按钮 / 远端 audio 绑定 —— 放到 voice 模块定义之后，
  // 见 wireVoiceButtons()，调用时机在 voice 模块声明结束后
  sendBtn.onclick = sendText;
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
  inputEl.addEventListener('input', function () {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(100, inputEl.scrollHeight) + 'px';
  });

  function setStatus(text, ok) {
    statusEl.textContent = text;
    dotEl.classList.toggle('off', !ok);
  }

  // ====== 语音通话（WebRTC + WSS 信令） ======
  // 完整流程：
  //   visitor 点电话按钮 → getUserMedia → ws.send(voice_call) →
  //   等 voice_accept (agent 接听，来源是 e.from) → 创建 RTCPeerConnection +
  //   addTrack + createOffer + setLocalDescription → ws.send(voice_offer, to=agent) →
  //   收 voice_answer → setRemoteDescription → 双方互换 voice_ice → 通话建立
  //   任何一方 voice_end → 关闭 PC + 关麦克风 + 撤窗
  var voice = {
    state: 'idle',  // idle / ringing / accepting / talking / ended
    callId: null,
    pc: null,
    localStream: null,
    remoteAudio: null,
    remoteAgent: null,  // "agent:xxx" 接听方
    startTs: 0,
    timer: null,        // 拨号超时 / 通话计时
  };
  var ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

  function voicePanel() { return document.getElementById('voicePanel'); }
  function voiceSetStatus(text, klass) {
    var p = voicePanel();
    if (!p) return;
    p.style.display = 'flex';
    p.querySelector('.voice-status').textContent = text;
    p.classList.remove('voice-panel--talking', 'voice-panel--ended');
    if (klass) p.classList.add(klass);
  }
  function voiceHidePanel() {
    var p = voicePanel(); if (!p) return;
    p.style.display = 'none';
    p.classList.remove('voice-panel--talking', 'voice-panel--ended');
  }

  async function voiceStart() {
    if (voice.state !== 'idle') return;
    if (!alive) { renderSys('未连接，无法呼叫'); return; }
    voice.state = 'ringing';
    voice.callId = 'call-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    try {
      voice.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      voice.state = 'idle';
      renderSys('无法访问麦克风：' + (e.message || e));
      return;
    }
    voiceSetStatus('拨号中…等待客服接听');
    ws.send(JSON.stringify({
      type: 'voice_call', ts: Date.now(),
      extra: { call_id: voice.callId }
    }));
    // 30 秒无人接听自动挂断
    voice.timer = setTimeout(function () {
      if (voice.state === 'ringing') voiceEnd('无人接听');
    }, 30000);
  }

  function createVoicePC() {
    var pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    pc.onicecandidate = function (ev) {
      if (ev.candidate && voice.remoteAgent) {
        ws.send(JSON.stringify({
          type: 'voice_ice', to: voice.remoteAgent, ts: Date.now(),
          extra: {
            call_id: voice.callId,
            candidate: ev.candidate.candidate,
            sdpMid: ev.candidate.sdpMid,
            sdpMLineIndex: ev.candidate.sdpMLineIndex
          }
        }));
      }
    };
    pc.ontrack = function (ev) {
      if (voice.remoteAudio && ev.streams[0]) {
        voice.remoteAudio.srcObject = ev.streams[0];
      }
    };
    pc.onconnectionstatechange = function () {
      if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
        voiceEnd('连接中断');
      }
    };
    return pc;
  }

  async function voiceOnAccept(env) {
    if (voice.state !== 'ringing') return;
    var cid = env.extra && env.extra.call_id;
    if (cid !== voice.callId) return;
    if (voice.timer) { clearTimeout(voice.timer); voice.timer = null; }
    voice.remoteAgent = env.from;  // "agent:xxx"
    voice.state = 'accepting';
    voiceSetStatus('正在建立通话…');
    voice.pc = createVoicePC();
    voice.localStream.getTracks().forEach(function (t) {
      voice.pc.addTrack(t, voice.localStream);
    });
    var offer = await voice.pc.createOffer();
    await voice.pc.setLocalDescription(offer);
    ws.send(JSON.stringify({
      type: 'voice_offer', to: voice.remoteAgent, ts: Date.now(),
      extra: { call_id: voice.callId, sdp: offer.sdp }
    }));
  }

  async function voiceOnAnswer(env) {
    if (voice.state !== 'accepting' || !voice.pc) return;
    try {
      await voice.pc.setRemoteDescription({ type: 'answer', sdp: env.extra.sdp });
    } catch (e) {
      voiceEnd('协商失败');
      return;
    }
    voice.state = 'talking';
    voice.startTs = Date.now();
    voiceSetStatus('通话中 00:00', 'voice-panel--talking');
    voice.timer = setInterval(function () {
      if (voice.state !== 'talking') return;
      var sec = Math.floor((Date.now() - voice.startTs) / 1000);
      var mm = String(Math.floor(sec / 60)).padStart(2, '0');
      var ss = String(sec % 60).padStart(2, '0');
      voiceSetStatus('通话中 ' + mm + ':' + ss, 'voice-panel--talking');
    }, 1000);
  }

  async function voiceOnIce(env) {
    if (!voice.pc || !env.extra) return;
    try {
      await voice.pc.addIceCandidate({
        candidate: env.extra.candidate,
        sdpMid: env.extra.sdpMid,
        sdpMLineIndex: env.extra.sdpMLineIndex
      });
    } catch (e) {}
  }

  function voiceOnReject(env) {
    if (voice.state !== 'ringing') return;
    voiceEnd('客服拒绝了通话');
  }

  function voiceOnEnd(env) {
    if (voice.state === 'idle') return;
    voiceEnd('对方已挂断');
  }

  function voiceEnd(reason) {
    if (voice.state === 'idle') return;
    if (voice.remoteAgent) {
      ws.send(JSON.stringify({
        type: 'voice_end', to: voice.remoteAgent, ts: Date.now(),
        extra: { call_id: voice.callId, reason: reason || '' }
      }));
    } else {
      // 拨号期间没人接，广播给所有 agent 让来电浮窗消失
      ws.send(JSON.stringify({
        type: 'voice_end', ts: Date.now(),
        extra: { call_id: voice.callId, reason: reason || '' }
      }));
    }
    if (voice.pc) { try { voice.pc.close(); } catch {} voice.pc = null; }
    if (voice.localStream) {
      voice.localStream.getTracks().forEach(function (t) { t.stop(); });
      voice.localStream = null;
    }
    if (voice.timer) { clearTimeout(voice.timer); clearInterval(voice.timer); voice.timer = null; }
    if (voice.remoteAudio) voice.remoteAudio.srcObject = null;
    voice.state = 'ended';
    voice.callId = null;
    voice.remoteAgent = null;
    voiceSetStatus(reason || '通话结束', 'voice-panel--ended');
    setTimeout(function () {
      if (voice.state === 'ended') { voice.state = 'idle'; voiceHidePanel(); }
    }, 2500);
  }

  // 暴露给 ws.onmessage 调用
  window.handleVoiceSignal = function (env) {
    switch (env.type) {
      case 'voice_accept': voiceOnAccept(env); break;
      case 'voice_reject': voiceOnReject(env); break;
      case 'voice_answer': voiceOnAnswer(env); break;
      case 'voice_ice':    voiceOnIce(env); break;
      case 'voice_end':    voiceOnEnd(env); break;
    }
  };

  // 按钮绑定 + DOM 引用（必须在 var voice = {...} 之后，否则 hoist 后 voice 是 undefined）
  (function wireVoiceButtons() {
    var voiceBtn = document.getElementById('voiceBtn');
    var voiceHangBtn = document.getElementById('voiceHangBtn');
    voice.remoteAudio = document.getElementById('voiceRemoteAudio');
    if (voiceBtn) voiceBtn.onclick = function () { voiceStart(); };
    if (voiceHangBtn) voiceHangBtn.onclick = function () { voiceEnd('您挂断了'); };
  })();

  // ====== 通知声音（真实录制 WAV 文件） ======
  // 访客端只听 visitor 系列 3 种音色，加 none。文件在 widget/public/sounds/，
  // 浏览器访问路径 ./sounds/visitorN.wav（相对当前 chat.html 所在 /widget/ 路径）
  var SOUND_FILES = {
    visitor1: 'sounds/visitor1.wav',
    visitor2: 'sounds/visitor2.wav',
    visitor3: 'sounds/visitor3.wav'
  };
  // 预加载所有音频元素：第一次试听零延迟
  var soundCache = {};
  Object.keys(SOUND_FILES).forEach(function (k) {
    var a = new Audio(SOUND_FILES[k]);
    a.preload = 'auto';
    a.volume = 1.0;
    soundCache[k] = a;
  });
  var lastPlay = 0;
  function playNotify() {
    if (!notifySound || notifySound === 'none') return;
    var now = Date.now();
    if (now - lastPlay < 500) return; // 500ms 防抖
    lastPlay = now;
    var a = soundCache[notifySound];
    // 老用户数据库里可能存的是 classic/chime 等旧 key → fallback 到 visitor1
    if (!a) a = soundCache.visitor1;
    if (!a) return;
    try {
      a.currentTime = 0;
      a.volume = 1.0;
      var p = a.play();
      if (p && p.catch) p.catch(function () {});
    } catch (e) {}
  }
  // 浏览器要求音频必须用户手势触发；用户在聊天框第一次点击时解锁所有 Audio
  document.addEventListener('click', function () {
    Object.keys(soundCache).forEach(function (k) {
      var a = soundCache[k];
      try {
        a.volume = 0;
        var p = a.play();
        if (p && p.then) p.then(function () { a.pause(); a.currentTime = 0; a.volume = 1.0; })
                          .catch(function () { a.volume = 1.0; });
        else a.volume = 1.0;
      } catch (e) { a.volume = 1.0; }
    });
  }, { once: true, capture: true });

  // ====== 时间格式化 ======
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function fmtAbs(ts) {
    var d = new Date(ts);
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
      ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }
  function fmtGroupTime(ts) {
    var d = new Date(ts), now = new Date();
    var sameDay = d.getFullYear() === now.getFullYear() &&
                  d.getMonth() === now.getMonth() &&
                  d.getDate() === now.getDate();
    if (sameDay) return '今天 ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    var yest = new Date(now.getFullYear(), now.getMonth(), now.getDate()-1);
    if (d.getFullYear() === yest.getFullYear() &&
        d.getMonth() === yest.getMonth() &&
        d.getDate() === yest.getDate()) {
      return '昨天 ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    return pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function escape(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ====== 渲染 ======
  // ====== 已读角标管理 ======
  // 设计：访客视角下，只在「自己最后一条消息」的最后一组 stack 内显示『已读』。
  // 新发消息时清掉旧角标；收到客服 read 事件时挂上新角标。
  function setReadIndicator(visible) {
    var olds = listEl.querySelectorAll('.read-indicator');
    for (var i = 0; i < olds.length; i++) olds[i].remove();
    if (!visible) return;
    // 找到最后一组「自己发的」stack：lastGroup 必须 isMine=true（访客发的）
    if (lastGroup && lastGroup.isMine && lastGroup.bubbles) {
      var ind = document.createElement('div');
      ind.className = 'read-indicator';
      ind.textContent = '已读';
      lastGroup.bubbles.appendChild(ind);
    }
  }
  function sendReadAck() {
    if (alive && convID) {
      try { ws.send(JSON.stringify({ type: 'read', conv: convID, ts: Date.now() })); }
      catch {}
    }
  }

  // Fallback：同域时 chat.html 自己读 parent.location，不依赖 loader.js postMessage。
  // 这样即使集成方还在用 loader.js 的旧缓存（没 postPageInfo），同域场景也能正常上报。
  // 跨域时 parent.location 访问 throws SecurityError，由 loader.js postMessage 兜底。
  function tryReadHostPageDirectly() {
    try {
      if (parent && parent !== window) {
        var u = parent.location && parent.location.href;
        var t = parent.document && parent.document.title;
        if (u && !hostURL) {
          hostURL = u;
          hostTitle = t || '';
          return true;
        }
      }
    } catch (e) { /* 跨域，忽略 */ }
    return false;
  }

  // 上报当前页面给服务端（让客服后台看到访客的浏览轨迹）。
  // 触发时机：(1) WSS 上线 onopen (2) 收到 loader.js 推送的 page_info (3) 启动时 fallback 自读
  // 上报需要同时满足：WSS alive + convID 已建立 + 拿到 hostURL + URL 跟上次不同
  function reportPageView() {
    if (!alive || !convID) return;
    if (!hostURL) tryReadHostPageDirectly(); // 兜底自读
    if (!hostURL) return;
    if (pageReported === hostURL) return;
    pageReported = hostURL;
    try {
      ws.send(JSON.stringify({
        type: 'page',
        conv: convID,
        ts: Date.now(),
        extra: { url: hostURL, title: hostTitle }
      }));
    } catch {}
  }

  function renderTimeDivider(ts) {
    var d = document.createElement('div');
    d.className = 'time-divider';
    d.innerHTML = '<span>' + escape(fmtGroupTime(ts)) + '</span>';
    listEl.appendChild(d);
  }

  function renderSys(text) {
    var d = document.createElement('div');
    d.className = 'sys-chip';
    d.textContent = text;
    listEl.appendChild(d);
    listEl.scrollTop = listEl.scrollHeight;
    lastGroup = null;
  }

  function buildBubble(m, isMine) {
    var b = document.createElement('div');
    b.className = 'bubble';
    b.title = fmtAbs(m.created_at || m.ts || Date.now());

    var mediaURL = m.media_url?.String || m.media_url || m.media || '';
    var mediaKind = m.media_kind?.String || m.media_kind || m.mkind || '';
    var mediaName = m.media_name?.String || m.media_name || m.mname || '';

    if (mediaURL && mediaKind === 'image') {
      b.classList.add('bubble-image');
      var img = document.createElement('img');
      img.className = 'img-msg';
      img.src = httpBase + mediaURL;
      img.onclick = function () { window.open(httpBase + mediaURL, '_blank'); };
      b.appendChild(img);
    } else if (mediaURL) {
      var a = document.createElement('a');
      a.className = 'file-card';
      a.target = '_blank';
      a.href = httpBase + mediaURL;
      a.innerHTML =
        '<span class="ico">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">' +
            '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/>' +
          '</svg>' +
        '</span>' +
        '<span class="meta">' +
          '<span class="name">' + escape(mediaName || '附件') + '</span>' +
          '<span class="sub">点击下载</span>' +
        '</span>';
      b.appendChild(a);
    }
    if (m.content) {
      var t = document.createElement('span');
      t.textContent = m.content;
      t.style.display = 'block';
      b.appendChild(t);
    }
    // 复制按钮：文本 / 文件 / 图片消息都加（hover 才显示）
    if (m.content || mediaURL) {
      var cp = document.createElement('span');
      cp.className = 'bubble-copy';
      cp.title = '复制';
      cp.innerHTML =
        '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>' +
          '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>' +
        '</svg>';
      cp.onclick = function (e) {
        e.stopPropagation();
        var text = m.content || (mediaURL ? httpBase + mediaURL : '');
        if (!text) return;
        copyToClipboard(text, cp);
      };
      b.appendChild(cp);
    }
    return b;
  }

  // 复制到剪贴板：优先 Clipboard API，老浏览器 fallback execCommand
  function copyToClipboard(text, anchorEl) {
    var done = function () {
      // 简易反馈：临时改背景色 + 显示"已复制"
      if (!anchorEl) return;
      anchorEl.title = '已复制';
      anchorEl.classList.add('bubble-copy--done');
      setTimeout(function () {
        anchorEl.title = '复制';
        anchorEl.classList.remove('bubble-copy--done');
      }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function () {});
      return;
    }
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
  }

  function render(m) {
    var isMine = m.sender === 'visitor';
    var ts = new Date(m.created_at || m.ts || Date.now()).getTime();

    // 与上一组同发送者且 < 5 分钟，则合并到同一 line（隐藏头像）
    if (lastGroup && lastGroup.isMine === isMine && (ts - lastGroup.ts) < 5 * 60 * 1000) {
      var bubble = buildBubble(m, isMine);
      lastGroup.bubbles.appendChild(bubble);
      lastGroup.ts = ts;
    } else {
      // 新组：先时间分隔条
      if (!lastGroup || (ts - lastGroup.ts) > 5 * 60 * 1000) {
        renderTimeDivider(ts);
      }
      var line = document.createElement('div');
      line.className = 'msg-line ' + (isMine ? 'mine' : 'theirs');

      var avatar = document.createElement('div');
      avatar.className = 'msg-avatar ' + (isMine ? 'visitor' : 'agent');
      avatar.textContent = isMine ? '我' : '客';
      line.appendChild(avatar);

      var stack = document.createElement('div');
      stack.className = 'msg-stack';
      line.appendChild(stack);

      var bubble = buildBubble(m, isMine);
      stack.appendChild(bubble);

      listEl.appendChild(line);
      lastGroup = { isMine: isMine, ts: ts, bubbles: stack };
    }
    listEl.scrollTop = listEl.scrollHeight;
  }

  // ====== 启动 ======
  async function loadPublicSettings() {
    try {
      var r = await fetch(httpBase + '/api/visitor/settings');
      var data = await r.json();
      if (data.code === 0 && data.data) {
        notifySound = data.data.notify_sound || 'classic';
        if (data.data.widget_title) {
          var titleEl = document.querySelector('header .header-title');
          if (titleEl) titleEl.textContent = data.data.widget_title;
        }
        // 语音按钮提示文字（管理员在 admin Settings 里配置）
        if (data.data.voice_call_hint) {
          var voiceHintEl = document.getElementById('voiceBtnHint');
          if (voiceHintEl) voiceHintEl.textContent = data.data.voice_call_hint;
          var voiceBtnEl = document.getElementById('voiceBtn');
          if (voiceBtnEl) voiceBtnEl.title = data.data.voice_call_hint;
        }
      }
    } catch {}
  }

  async function bootstrap() {
    // 启动时立即尝试自读 parent.location（同域 fallback），不等 loader.js postMessage
    tryReadHostPageDirectly();
    await loadPublicSettings();
    try {
      var resp = await fetch(httpBase + '/api/visitor/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          visitor_id: visitorID,
          site_id: siteID,
          referer: document.referrer || '',
          last_page: parent.location ? parent.location.href : '',
          ua: navigator.userAgent
        })
      });
      var data = await resp.json();
      if (data.code !== 0) throw new Error(data.msg || '会话创建失败');
      visitorID = data.visitor_id;
      convID = data.conversation;
      token = data.visitor_token;
      localStorage.setItem(STORE_KEY, JSON.stringify({ visitor_id: visitorID }));
      loadHistoryFromCache();
      // 注意：问候消息不在这里渲染。服务端会在我们的 WSS 上线后主动推送
      // type=chat from=sys 消息，由下面的 ws.onmessage 走完整逻辑（含播声 / 未读）
      connectWS();
    } catch (e) {
      setStatus('连接失败，重试中', false);
      setTimeout(bootstrap, 5000);
    }
  }

  function loadHistoryFromCache() {
    try {
      var cache = JSON.parse(localStorage.getItem(STORE_KEY + '_msgs') || '[]');
      cache.slice(-50).forEach(render);
    } catch {}
  }

  function persistMsg(m) {
    try {
      var cache = JSON.parse(localStorage.getItem(STORE_KEY + '_msgs') || '[]');
      cache.push(m);
      if (cache.length > 200) cache = cache.slice(-200);
      localStorage.setItem(STORE_KEY + '_msgs', JSON.stringify(cache));
    } catch {}
  }

  function connectWS() {
    var url = endpoint.replace(/^https?:\/\//, function (m) {
      return m === 'https://' ? 'wss://' : 'ws://';
    }) + '/ws/visitor?token=' + encodeURIComponent(token);
    ws = new WebSocket(url);
    ws.onopen = function () {
      alive = true; retry = 0;
      setStatus('在线', true);
      pingTimer = setInterval(function () {
        if (alive) try { ws.send(JSON.stringify({ type: 'ping', ts: Date.now() })); } catch {}
      }, 30000);
      // WSS 上线后立即上报当前页面（如果 page_info 已经就绪）
      reportPageView();
    };
    ws.onmessage = function (ev) {
      var env;
      try { env = JSON.parse(ev.data); } catch { return; }
      if (env.type === 'pong') return;
      if (env.type === 'hello') { renderSys('您已接入客服，请描述您的问题'); return; }
      if (env.type === 'error') { renderSys('系统：' + (env.content || '')); return; }
      if (env.type === 'read') {
        // 客服读了访客消息：在访客最后一组消息上挂「已读」角标
        if (env.from && env.from.indexOf('agent:') === 0) {
          setReadIndicator(true);
        }
        return;
      }
      // 语音通话信令分发（仅当存在 voice 模块时，避免 undefined）
      if (env.type && env.type.indexOf('voice_') === 0) {
        if (window.handleVoiceSignal) window.handleVoiceSignal(env);
        return;
      }
      if (env.type === 'chat') {
        if (env.from && env.from.indexOf('visitor:') === 0) return;
        var m = {
          sender: 'agent',
          content: env.content || '',
          media_url: env.media || '',
          media_kind: env.mkind || '',
          media_name: env.mname || '',
          created_at: new Date(env.ts || Date.now()).toISOString()
        };
        render(m); persistMsg(m);
        playNotify(); // 收到客服 / 系统消息播声
        // 只在 widget 收起时累计未读。loader.js 通过 widget_state 通知。
        if (!isWidgetOpen) {
          unread++;
          parent.postMessage({ __cs: 1, type: 'unread', count: unread }, '*');
        } else {
          // widget 当前是打开的，访客看到了客服消息 → 立即发 read 通知客服
          sendReadAck();
        }
      }
    };
    ws.onclose = function () {
      alive = false;
      clearInterval(pingTimer);
      setStatus('已断开，重连中', false);
      var backoff = Math.min(30000, 1000 * Math.pow(1.6, retry++));
      setTimeout(connectWS, backoff);
    };
    ws.onerror = function () { try { ws.close(); } catch {} };
  }

  function sendText() {
    var text = inputEl.value.trim();
    if (!text) return;
    if (!alive) { setStatus('未连接', false); return; }
    ws.send(JSON.stringify({ type: 'chat', conv: convID, content: text, ts: Date.now(), prio: 0 }));
    var m = { sender: 'visitor', content: text, created_at: new Date().toISOString() };
    render(m); persistMsg(m);
    // 新消息发出：清除旧的「已读」角标（这条消息还没被读）
    setReadIndicator(false);
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  // 公共上传函数，文件选择和粘贴两个入口共用
  async function uploadAndSendFile(file) {
    if (!file) return;
    if (!alive) { renderSys('未连接，无法上传'); return; }
    var fd = new FormData();
    fd.append('file', file);
    fd.append('uploader', 'visitor');
    try {
      var r = await fetch(httpBase + '/api/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: fd
      });
      var data = await r.json();
      if (data.code !== 0) throw new Error(data.msg);
      ws.send(JSON.stringify({
        type: 'chat', conv: convID, content: '',
        media: data.url, mkind: data.kind, mname: data.name, msize: data.size,
        ts: Date.now(), prio: 0
      }));
      var m = {
        sender: 'visitor', content: '',
        media_url: data.url, media_kind: data.kind, media_name: data.name,
        created_at: new Date().toISOString()
      };
      render(m); persistMsg(m);
      setReadIndicator(false);
    } catch (err) {
      renderSys('文件发送失败：' + (err.message || ''));
    }
  }

  async function onPickFile(e) {
    var file = e.target.files && e.target.files[0];
    await uploadAndSendFile(file);
    e.target.value = '';
  }

  // 输入框监听 paste：剪贴板里有 file（图片截图 / 文件复制）→ 直接上传发出
  // 普通文本粘贴不拦截，仍走默认 textarea 行为
  inputEl.addEventListener('paste', function (e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].kind === 'file') {
        e.preventDefault();
        var f = items[i].getAsFile();
        if (f) uploadAndSendFile(f);
        break;
      }
    }
  });

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') {
      unread = 0;
      parent.postMessage({ __cs: 1, type: 'unread', count: 0 }, '*');
    }
  });

  // 跳到最新消息（最底部）。打开 widget 时 / loadHistory 完成时调。
  // 用双 rAF 等浏览器完成 display:none -> display:block 的 layout reflow，
  // 否则首次打开时 scrollHeight 可能还是 0。
  function scrollToBottom() {
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (listEl) listEl.scrollTop = listEl.scrollHeight;
      });
    });
  }

  // 接收 loader.js 通知的 widget 开关状态 / 宿主页面信息
  window.addEventListener('message', function (ev) {
    if (!ev.data || ev.data.__cs !== 1) return;
    if (ev.data.type === 'widget_state') {
      isWidgetOpen = !!ev.data.open;
      if (isWidgetOpen) {
        unread = 0;
        parent.postMessage({ __cs: 1, type: 'unread', count: 0 }, '*');
        // widget 刚打开：访客看到了所有客服消息 → 发 read 通知客服
        sendReadAck();
        // 自动跳到最新消息（不让访客看到上次的滚动位置，省去手动下拉）
        scrollToBottom();
      }
    }
    if (ev.data.type === 'page_info') {
      hostURL = ev.data.url || '';
      hostTitle = ev.data.title || '';
      reportPageView();
    }
  });

  bootstrap();
})();
</script>
</body>
</html>
