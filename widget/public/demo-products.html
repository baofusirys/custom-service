<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品介绍 · Custom Service Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f5f7fa;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Microsoft YaHei", sans-serif; color: #2c3034; }
    nav { background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 12px 24px; display: flex; align-items: center; gap: 24px;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    nav .brand { font-weight: 700; font-size: 18px; color: #2974ff; }
    nav a { color: #4b5563; text-decoration: none; font-size: 14px;
      padding: 6px 10px; border-radius: 6px; transition: background .15s; }
    nav a:hover { background: #f3f4f6; color: #2974ff; }
    nav a.active { color: #2974ff; background: #eff6ff; }
    main { max-width: 1080px; margin: 40px auto; padding: 0 24px; }
    h1 { font-size: 28px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .product {
      background: #fff; padding: 24px; border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      transition: transform .15s, box-shadow .15s;
    }
    .product:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    .product .icon { width: 48px; height: 48px; border-radius: 10px;
      background: linear-gradient(135deg, #4a90ff 0%, #2974ff 100%);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 14px; }
    .product h3 { margin: 0 0 8px; font-size: 17px; }
    .product p { margin: 0; color: #6b7280; font-size: 14px; }
    .product .price { color: #2974ff; font-weight: 600; margin-top: 12px; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Custom Service Demo</span>
    <a href="/widget/demo.html">首页</a>
    <a href="/widget/demo-products.html" class="active">产品</a>
    <a href="/widget/demo-pricing.html">价格</a>
    <a href="/widget/demo-contact.html">联系我们</a>
  </nav>
  <main>
    <h1>产品系列</h1>
    <div class="grid">
      <div class="product">
        <div class="icon">A</div>
        <h3>客服基础版</h3>
        <p>1 名客服 / 单站点 / 内置 11 种提示音</p>
        <div class="price">¥ 99 / 月</div>
      </div>
      <div class="product">
        <div class="icon">B</div>
        <h3>客服专业版</h3>
        <p>5 名客服 / 多站点 / 访客画像 / 页面跟踪</p>
        <div class="price">¥ 299 / 月</div>
      </div>
      <div class="product">
        <div class="icon">C</div>
        <h3>客服企业版</h3>
        <p>无限客服 / 多租户 / 私有部署 / SLA 99.95%</p>
        <div class="price">联系销售</div>
      </div>
      <div class="product">
        <div class="icon">D</div>
        <h3>开发者套件</h3>
        <p>开放 API / Webhook / 自定义 UI</p>
        <div class="price">¥ 0（开源）</div>
      </div>
    </div>
  </main>
  <script src="/widget/loader.js" data-cs-site="default" defer></script>
</body>
</html>
