server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # widget 是给第三方网站嵌入用的，需要跨域可读
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  add_header X-Content-Type-Options "nosniff" always;

  # iframe 内页面可被任意页面 <iframe> 包含
  add_header X-Frame-Options "" always;

  # ─────────────────────────────────────────────────────────────────────
  # 关键：loader.js / chat.html 是 widget 的入口文件，更新频繁。
  # 用 no-cache 让浏览器**每次都向服务器验证**（带 If-None-Match / If-Modified-Since）：
  #   - 文件没变 → 服务器 304，浏览器用本地缓存，零下载开销
  #   - 文件有变 → 服务器 200 + 新内容，浏览器立即拿到新版
  # 这样部署新版 widget 后用户不用清缓存就能拿到。
  # ─────────────────────────────────────────────────────────────────────
  location = /loader.js {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
  }
  location = /chat.html {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
  # 其他静态资源（图片、字体等）保留长缓存
  location ~* \.(?:css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }
  gzip on;
  gzip_types text/plain text/css application/javascript image/svg+xml;
  gzip_min_length 512;
}
